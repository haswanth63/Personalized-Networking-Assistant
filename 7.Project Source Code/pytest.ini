[pytest]
# pytest configuration

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test execution settings
addopts = 
    -v
    --tb=short
    --strict-markers
    --maxfail=1
    --cov=app
    --cov-report=html
    --cov-report=term
    --cov-report=term-missing

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    skip: Skip tests

# Test paths
testpaths = tests

# Ignore directories
norecursedirs = 
    .git
    .venv
    venv
    __pycache__
    data

# Python path
pythonpath = .